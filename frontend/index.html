<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz Platform</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --primary-color: #7c3aed;
      --success: #10b981;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif; color: white;
    }
    .glass-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 2rem;
      backdrop-filter: blur(10px);
      width: 100%; max-width: 480px;
    }
    h1 { font-size: 2rem; margin-bottom: 0.5rem; color: #a78bfa; }
    p.sub { color: #94a3b8; margin-bottom: 2rem; }
    label { display: block; margin-bottom: 0.4rem; color: #94a3b8; font-size: 0.9rem; }
    input, select {
      width: 100%; padding: 0.75rem 1rem; border-radius: 8px;
      border: 1px solid #334155; background: rgba(0,0,0,0.4);
      color: white; font-size: 1rem; margin-bottom: 1.2rem; outline: none;
    }
    input:focus, select:focus { border-color: #7c3aed; }
    .btn {
      width: 100%; padding: 0.85rem; border: none; border-radius: 10px;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white; font-size: 1rem; font-weight: 600; cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn:hover { opacity: 0.88; }
    #error { color: #f87171; margin-top: 1rem; font-size: 0.9rem; display: none; }
  </style>
</head>
<body>
  <div class="glass-card">
    <h1>🧠 Quiz Platform</h1>
    <p class="sub">Test your full-stack knowledge</p>

    <label for="studentId">Your Name / Student ID</label>
    <input type="text" id="studentId" placeholder="e.g. alice123" />

    <label for="quizSelect">Select Quiz</label>
    <select id="quizSelect"><option value="">Loading quizzes...</option></select>

    <button class="btn" onclick="startQuiz()">Start Quiz →</button>
    <div id="error"></div>
  </div>

  <script>
    async function loadQuizzes() {
      try {
        const res = await fetch('/api/quiz');
        const quizzes = await res.json();
        const sel = document.getElementById('quizSelect');
        sel.innerHTML = quizzes.map(q =>
          `<option value="${q._id}">${q.title} (${q.subject}, ${q.duration_seconds / 60} min)</option>`
        ).join('');
      } catch (err) {
        document.getElementById('quizSelect').innerHTML = '<option>Failed to load</option>';
      }
    }

    async function startQuiz() {
      const studentId = document.getElementById('studentId').value.trim();
      const quizId = document.getElementById('quizSelect').value;
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';

      if (!studentId) { errEl.textContent = 'Please enter your name/student ID.'; errEl.style.display = 'block'; return; }
      if (!quizId) { errEl.textContent = 'Please select a quiz.'; errEl.style.display = 'block'; return; }

      try {
        const res = await fetch(`/api/quiz/${quizId}/start`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ studentId })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error);

        sessionStorage.setItem('studentId', studentId);
        sessionStorage.setItem('quizId', quizId);
        sessionStorage.setItem('ttl', data.ttl);
        window.location.href = '/quiz.html';
      } catch (err) {
        errEl.textContent = 'Error: ' + err.message;
        errEl.style.display = 'block';
      }
    }

    loadQuizzes();
  </script>
</body>
</html>
