<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Quiz Results</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root { --primary-color: #7c3aed; --success: #10b981; }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a, #1e1b4b);
      font-family: 'Segoe UI', sans-serif; color: white;
      display: flex; align-items: center; justify-content: center; padding: 2rem;
    }
    .glass-card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px; padding: 2rem;
      backdrop-filter: blur(10px);
      width: 100%; max-width: 680px;
    }
    h2 { color: #a78bfa; margin-bottom: 0.5rem; font-size: 1.8rem; }
    .score-box {
      background: rgba(124,58,237,0.2);
      border: 1px solid #7c3aed;
      border-radius: 12px; padding: 1.5rem; text-align: center; margin: 1.5rem 0;
    }
    .score-box .big { font-size: 3rem; font-weight: bold; color: #a78bfa; }
    .score-box .label { color: #94a3b8; margin-top: 0.3rem; }
    .stat-row { display: flex; gap: 1rem; margin-bottom: 1.5rem; }
    .stat {
      flex: 1; background: rgba(0,0,0,0.3); border-radius: 10px;
      padding: 1rem; text-align: center;
    }
    .stat .val { font-size: 1.5rem; font-weight: bold; color: #7dd3fc; }
    .stat .lbl { color: #94a3b8; font-size: 0.85rem; margin-top: 0.3rem; }
    .answer-list { margin-top: 1.5rem; }
    .answer-item {
      background: rgba(0,0,0,0.3); border-radius: 10px;
      padding: 1rem; margin-bottom: 0.8rem;
      border-left: 4px solid #334155;
    }
    .answer-item.correct { border-left-color: #10b981; }
    .answer-item.wrong   { border-left-color: #ef4444; }
    .answer-item .q-text { font-weight: 600; margin-bottom: 0.4rem; font-size: 0.95rem; }
    .answer-item .a-text { color: #94a3b8; font-size: 0.85rem; }
    .badge {
      display: inline-block; padding: 2px 8px; border-radius: 4px;
      font-size: 0.75rem; font-weight: bold; margin-left: 0.5rem;
    }
    .badge.ok  { background: #065f46; color: #6ee7b7; }
    .badge.bad { background: #7f1d1d; color: #fca5a5; }
    .btn {
      display: inline-block; margin-top: 1.5rem; padding: 0.75rem 2rem;
      background: linear-gradient(135deg, #7c3aed, #4f46e5);
      color: white; border: none; border-radius: 10px;
      font-size: 1rem; cursor: pointer; text-decoration: none; font-weight: 600;
    }
    .btn:hover { opacity: 0.88; }
    #loading { text-align: center; color: #94a3b8; padding: 3rem; }
  </style>
</head>
<body>
  <div class="glass-card" id="content">
    <div id="loading">Loading results...</div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const attemptId = params.get('attemptId');

    async function loadResults() {
      if (!attemptId) {
        document.getElementById('loading').textContent = 'No attempt ID found.';
        return;
      }
      try {
        const res = await fetch(`/api/quiz/results/${attemptId}`);
        if (!res.ok) throw new Error('Failed to load results');
        const { attempt, rank } = await res.json();

        const correct = attempt.answers.filter(a => a.is_correct).length;
        const total   = attempt.answers.length;
        const mins    = Math.floor(attempt.time_taken / 60);
        const secs    = attempt.time_taken % 60;

        document.getElementById('content').innerHTML = `
          <h2>🎉 Quiz Complete!</h2>
          <p style="color:#94a3b8">${attempt.quiz_id?.title || 'Quiz'}</p>

          <div class="score-box">
            <div class="big">${attempt.score} pts</div>
            <div class="label">Your Final Score</div>
          </div>

          <div class="stat-row">
            <div class="stat"><div class="val">${correct}/${total}</div><div class="lbl">Correct</div></div>
            <div class="stat"><div class="val">#${rank}</div><div class="lbl">Leaderboard Rank</div></div>
            <div class="stat"><div class="val">${mins}m ${secs}s</div><div class="lbl">Time Taken</div></div>
          </div>

          <h3 style="color:#94a3b8;margin-bottom:1rem">Answer Review</h3>
          <div class="answer-list">
            ${attempt.answers.map((a, i) => `
              <div class="answer-item ${a.is_correct ? 'correct' : 'wrong'}">
                <div class="q-text">
                  Q${i+1}: ${a.question_id?.question_text || 'Question'}
                  <span class="badge ${a.is_correct ? 'ok' : 'bad'}">${a.is_correct ? '✓ Correct' : '✗ Wrong'}</span>
                </div>
                <div class="a-text">Your answer: ${a.answer || '(no answer)'}</div>
              </div>`).join('')}
          </div>

          <a href="/" class="btn">← Take Another Quiz</a>
        `;
      } catch (err) {
        document.getElementById('loading').textContent = 'Error loading results: ' + err.message;
      }
    }

    loadResults();
  </script>
</body>
</html>
